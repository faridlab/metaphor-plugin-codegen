//! Domain Events Template

syntax = "proto3";

package {{MODULE_NAME}}.domain.event;

import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";

// {{PascalCaseEntity}} Domain Events
//
// Domain events represent something that happened in the domain
// that domain experts care about.

// {{PascalCaseEntity}}Created Event
message {{PascalCaseEntity}}CreatedEvent {
  // Event metadata
  string event_id = 1 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true
  ];

  string aggregate_id = 2 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true
  ];

  google.protobuf.Timestamp occurred_at = 3 [
    (buf.validate.field).required = true
  ];

  // TODO: Add event-specific data here
  // Example:
  // string created_by = 4;
  // string name = 5;
  // map<string, string> metadata = 6;
}

