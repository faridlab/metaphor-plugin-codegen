# Metaphor Framework Application Configuration
# Laravel-inspired configuration system for Rust

server:
  host: "${HOST:0.0.0.0}"
  port: "${PORT:3000}"
  workers: "${WORKERS:4}"
  keep_alive: "${KEEP_ALIVE:75}"
  read_timeout: "${READ_TIMEOUT:30}"
  write_timeout: "${WRITE_TIMEOUT:30}"

database:
  url: "${DATABASE_URL:postgresql://postgres:password@localhost:5432/bersihirdb}"
  max_connections: "${DB_MAX_CONNECTIONS:20}"
  min_connections: "${DB_MIN_CONNECTIONS:5}"
  connect_timeout: "${DB_CONNECT_TIMEOUT:30}"
  idle_timeout: "${DB_IDLE_TIMEOUT:600}"
  max_lifetime: "${DB_MAX_LIFETIME:1800}"

logging:
  level: "${LOG_LEVEL:info}"
  format: "${LOG_FORMAT:json}"  # json or pretty
  targets:
    - console
    - file: "${LOG_FILE:logs/metaphor.log}"
  tracing:
    service_name: "metaphor-app"
    service_version: "0.1.0"
    environment: "${APP_ENV:development}"

security:
  jwt:
    secret: "${JWT_SECRET:your-super-secret-jwt-key-change-in-production}"
    expiration: "${JWT_EXPIRATION:3600}"
    refresh_expiration: "${JWT_REFRESH_EXPIRATION:86400}"
    algorithm: "${JWT_ALGORITHM:HS256}"
  cors:
    allowed_origins: "${CORS_ORIGINS:http://localhost:3000}"
    allowed_methods: "${CORS_METHODS:GET,POST,PUT,DELETE,OPTIONS}"
    allowed_headers: "${CORS_HEADERS:*}"
    max_age: "${CORS_MAX_AGE:3600}"
  rate_limit:
    requests_per_minute: "${RATE_LIMIT_RPM:100}"
    burst_size: "${RATE_LIMIT_BURST:20}"

modules:
  # Module registration and configuration
  sapiens:
    enabled: "${SAPIENS_ENABLED:true}"
    database_url: "${SAPIENS_DB_URL:${DATABASE_URL}}"
    jwt_secret: "${SAPIENS_JWT_SECRET:${JWT_SECRET}}"
    features:
      registration: "${SAPIENS_REGISTRATION:true}"
      email_verification: "${SAPIENS_EMAIL_VERIFICATION:false}"
      password_reset: "${SAPIENS_PASSWORD_RESET:true}"

  postman:
    enabled: "${POSTMAN_ENABLED:true}"
    smtp_host: "${SMTP_HOST:localhost}"
    smtp_port: "${SMTP_PORT:1025}"
    smtp_username: "${SMTP_USERNAME:}"
    smtp_password: "${SMTP_PASSWORD:}"
    smtp_use_tls: "${SMTP_USE_TLS:false}"
    default_from: "${DEFAULT_FROM:noreply@metaphor.app}"

  bucket:
    enabled: "${BUCKET_ENABLED:true}"
    storage_type: "${STORAGE_TYPE:local}"  # local, s3, minio
    local_storage_path: "${LOCAL_STORAGE_PATH:./storage}"
    s3_region: "${S3_REGION:us-east-1}"
    s3_bucket: "${S3_BUCKET:metaphor-storage}"
    max_file_size: "${MAX_FILE_SIZE:10485760}"  # 10MB

# External Services Configuration
external_services:
  redis:
    url: "${REDIS_URL:redis://localhost:6379}"
    pool_size: "${REDIS_POOL_SIZE:10}"
    connection_timeout: "${REDIS_TIMEOUT:5}"

  elasticsearch:
    url: "${ELASTICSEARCH_URL:http://localhost:9200}"
    index_prefix: "${ES_INDEX_PREFIX:metaphor}"
    max_connections: "${ES_MAX_CONNECTIONS:10}"

# Health Monitoring
health:
  enabled: "${HEALTH_ENABLED:true}"
  check_interval: "${HEALTH_CHECK_INTERVAL:30}"
  endpoints:
    database: true
    redis: true
    external_services: true

# Background Jobs
jobs:
  enabled: "${JOBS_ENABLED:true}"
  max_workers: "${JOBS_MAX_WORKERS:4}"
  queue_size: "${JOBS_QUEUE_SIZE:1000}"

# Monitoring & Metrics
metrics:
  enabled: "${METRICS_ENABLED:true}"
  prometheus:
    enabled: "${PROMETHEUS_ENABLED:true}"
    endpoint: "/metrics"
    port: "${PROMETHEUS_PORT:9090}"