# {{MODULE_NAME_PASCAL}} Module Configuration
#
# Generated by metaphor-schema. Customize as needed.
#
# Override settings per environment:
#   - application-dev.yml for development
#   - application-prod.yml for production

server:
  host: 0.0.0.0
  port: 3000
  grpc_port: 50051

database:
  # PostgreSQL connection
  url: postgresql://root:password@localhost:5432/{{MODULE_NAME}}
  max_connections: 20
  min_connections: 5
  connect_timeout: 30
  idle_timeout: 600

module:
  name: {{MODULE_NAME}}
  enabled: true

features:
  soft_delete: false
  state_machines: true
  workflows: true

# Entity configurations will be generated by schema generator
# entities:
#   {{entity_name}}:
#     collection: {{entity_name}}s
#     enabled: true
#     cache_ttl: 300
#     pagination:
#       default_limit: 20
#       max_limit: 100

logging:
  level: info
  format: json
  file: logs/{{MODULE_NAME}}.log

tracing:
  enabled: true
  exporter: otlp
  endpoint: http://localhost:4317

metrics:
  enabled: true
  endpoint: /metrics
  port: 9090
