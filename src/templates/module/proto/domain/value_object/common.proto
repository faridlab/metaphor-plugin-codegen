syntax = "proto3";

package metaphor.domain.value_object;

import "buf/validate/validate.proto";

// Email value object
message Email {
  string value = 1 [
    (buf.validate.field).string.email = true,
    (buf.validate.field).required = true
  ];
  bool verified = 2;
}

// Address value object
message Address {
  string street = 1 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 200];
  string city = 2 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 100];
  string state = 3 [(buf.validate.field).string.min_len = 2, (buf.validate.field).string.max_len = 50];
  string country = 4 [(buf.validate.field).string.min_len = 2, (buf.validate.field).string.max_len = 50];
  string postal_code = 5 [(buf.validate.field).string.min_len = 3, (buf.validate.field).string.max_len = 20];
}

// Money value object
message Money {
  string currency = 1 [(buf.validate.field).string.min_len = 3, (buf.validate.field).string.max_len = 3];
  int64 amount = 2 [(buf.validate.field).int64.gte = 0];
}

// PhoneNumber value object
message PhoneNumber {
  string value = 1 [(buf.validate.field).string.pattern = "^\\+[1-9]\\d{1,14}$"];
  bool verified = 2;
}

// URL value object
message Url {
  string value = 1 [(buf.validate.field).string.uri = true, (buf.validate.field).required = true];
}

import "google/protobuf/timestamp.proto";

// Timestamp range value object
message TimestampRange {
  google.protobuf.Timestamp start = 1 [(buf.validate.field).required = true];
  google.protobuf.Timestamp end = 2 [(buf.validate.field).required = true];
}

// Identifier value object
message Identifier {
  string value = 1 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 100)];
  IdentifierType type = 2 [(buf.validate.field).enum.defined_only = true];
}

enum IdentifierType {
  IDENTIFIER_TYPE_UNSPECIFIED = 0;
  IDENTIFIER_TYPE_UUID = 1;
  IDENTIFIER_TYPE_SLUG = 2;
  IDENTIFIER_TYPE_CUSTOM = 3;
}