# {{MODULE_NAME_PASCAL}} Module - Hooks Index
# Version: 2.0
#
# This file defines module-level configuration for hooks (lifecycle behaviors).
# Hooks define: state machines, rules, permissions, triggers, computed fields.

module: {{MODULE_NAME}}
version: 2

# Import all hook files
# Add your hook files here:
imports: []
  # - example.hook.yaml

# =============================================================================
# Module-level configuration
# =============================================================================
config:
  # Authentication settings
  auth:
    session_ttl: 24.hours
    max_login_attempts: 5
    lockout_duration: 15.minutes

  # Audit settings
  audit:
    retention_days: 365
    archive_after_days: 90
    critical_events: []

  # Notification channels
  notifications:
    email_enabled: true
    sms_enabled: false
    push_enabled: false

# =============================================================================
# Shared domain events
# =============================================================================
events: {}
  # ExampleCreatedEvent:
  #   fields:
  #     id: uuid
  #     name: string

# =============================================================================
# Scheduled jobs
# =============================================================================
scheduled_jobs: {}
  # cleanup_expired:
  #   schedule: "every 1.hour"
  #   handler: Example.cleanup_expired
